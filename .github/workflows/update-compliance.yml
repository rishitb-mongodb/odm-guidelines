name: Update Compliance Counts

on:
  push:
    branches:
      - main
    paths:
      - 'odms/**'
      - 'guidelines/**'

jobs:
  update-compliance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run compliance update script
        run: python scripts/update-compliance.py

      - name: Commit updated README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update ODM compliance counts [skip ci]"
          git push
